name: macOS Sign & Notarize

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: '未签名 ZIP 的下载链接（包含 .app 文件）'
        required: true
      version:
        description: '版本号（例如：0.1.0）'
        required: true
        default: '0.1.0'

jobs:
  sign-and-notarize:
    runs-on: macos-latest
    
    steps:
      - name: Download and extract app
        run: |
          mkdir -p build
          echo "下载 ZIP 文件..."
          curl -L "${{ github.event.inputs.app_url }}" -o build/unsigned.zip
          
          # 检查文件大小
          SIZE=$(stat -f%z build/unsigned.zip)
          echo "文件大小: $SIZE bytes"
          
          if [ "$SIZE" -lt 1000000 ]; then
            echo "❌ 文件太小，可能下载失败"
            exit 1
          fi
          
          echo "✓ 下载完成，开始解压..."
          cd build
          unzip unsigned.zip
          
          # 找到 .app 文件
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          echo "找到 .app: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app 文件"
            exit 1
          fi
          
          ls -la

      - name: Import signing certificate
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$MAC_CERT_BASE64" | base64 --decode -o $CERT_PATH
          security import $CERT_PATH -P "$MAC_CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          rm $CERT_PATH

      - name: Setup Apple API Key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Sign app
        run: |
          cd build
          
          # 找到 .app
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          echo "签名 .app: $APP_PATH"
          
          # 获取证书
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F '"' '{print $2}')
          
          if [ -z "$IDENTITY" ]; then
            echo "❌ 未找到签名证书"
            exit 1
          fi
          
          echo "使用证书：$IDENTITY"
          
          # 签名所有嵌套的二进制文件和动态库（从内到外）
          echo "签名嵌套的二进制文件..."
          
          # 1. 签名 Resources/binaries 中的 Engine 二进制
          ENGINE_BINARIES_DIR="$APP_PATH/Contents/Resources/binaries"
          if [ -d "$ENGINE_BINARIES_DIR" ]; then
            echo "  签名 Engine 二进制文件..."
            for bin in "$ENGINE_BINARIES_DIR"/*; do
              if [ -f "$bin" ] && file "$bin" | grep -q "executable"; then
                echo "    签名: $(basename $bin)"
                codesign --force --sign "$IDENTITY" --options runtime "$bin"
              fi
            done
          fi
          
          # 2. 签名 Electron Framework 中的动态库
          ELECTRON_FRAMEWORK="$APP_PATH/Contents/Frameworks/Electron Framework.framework"
          if [ -d "$ELECTRON_FRAMEWORK" ]; then
            echo "  签名 Electron Framework 动态库..."
            LIBRARIES_DIR="$ELECTRON_FRAMEWORK/Versions/A/Libraries"
            if [ -d "$LIBRARIES_DIR" ]; then
              for lib in "$LIBRARIES_DIR"/*.dylib; do
                if [ -f "$lib" ]; then
                  echo "    签名: $(basename $lib)"
                  codesign --force --sign "$IDENTITY" --options runtime "$lib"
                fi
              done
            fi
          fi
          
          # 3. 签名 Squirrel.framework 中的可执行文件
          SQUIRREL_FRAMEWORK="$APP_PATH/Contents/Frameworks/Squirrel.framework"
          if [ -d "$SQUIRREL_FRAMEWORK" ]; then
            echo "  签名 Squirrel.framework..."
            SHIPIT="$SQUIRREL_FRAMEWORK/Versions/A/Resources/ShipIt"
            if [ -f "$SHIPIT" ]; then
              echo "    签名: ShipIt"
              codesign --force --sign "$IDENTITY" --options runtime "$SHIPIT"
            fi
            codesign --force --sign "$IDENTITY" --options runtime "$SQUIRREL_FRAMEWORK"
          fi
          
          # 4. 签名所有其他 framework
          echo "  签名其他 frameworks..."
          for framework in "$APP_PATH/Contents/Frameworks"/*.framework; do
            if [ -d "$framework" ] && [ "$framework" != "$SQUIRREL_FRAMEWORK" ]; then
              echo "    签名: $(basename $framework)"
              codesign --force --sign "$IDENTITY" --options runtime "$framework"
            fi
          done
          
          # 5. 签名所有 Helper app
          echo "  签名 Helper apps..."
          for helper in "$APP_PATH/Contents/Frameworks"/*\ Helper*.app; do
            if [ -d "$helper" ]; then
              echo "    签名: $(basename $helper)"
              codesign --force --sign "$IDENTITY" --options runtime "$helper"
            fi
          done
          
          # 6. 最后签名整个 .app
          echo "签名 .app..."
          codesign --deep --force --sign "$IDENTITY" --options runtime "$APP_PATH"
          
          # 验证
          echo "验证签名..."
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "✓ .app 签名完成"

      - name: Create and notarize DMG
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: |
          cd build
          
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          DMG_NAME="EduClaw_${{ github.event.inputs.version }}_signed.dmg"
          
          echo "创建 DMG..."
          hdiutil create -volname "EduClaw" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_NAME"
          echo "✓ DMG 创建完成: $DMG_NAME"
          
          echo "公证 DMG..."
          SUBMISSION_OUTPUT=$(xcrun notarytool submit "$DMG_NAME" --wait \
            --issuer "$APPLE_API_ISSUER" \
            --key-id "$APPLE_API_KEY" \
            --key "$APPLE_API_KEY_PATH" 2>&1)
          
          echo "$SUBMISSION_OUTPUT"
          
          # 提取 submission ID 和状态
          SUBMISSION_ID=$(echo "$SUBMISSION_OUTPUT" | grep "id:" | head -1 | sed 's/.*id: //' | tr -d ' ')
          STATUS=$(echo "$SUBMISSION_OUTPUT" | grep "status:" | sed 's/.*status: //' | tr -d ' ')
          
          echo "Submission ID: $SUBMISSION_ID"
          echo "Status: $STATUS"
          
          # 无论状态如何，都获取日志以便诊断
          echo "获取公证日志..."
          xcrun notarytool log "$SUBMISSION_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --key-id "$APPLE_API_KEY" \
            --key "$APPLE_API_KEY_PATH" > notary_log.json 2>&1 || true
          
          cat notary_log.json
          
          if [ "$STATUS" = "Invalid" ]; then
            echo "❌ 公证失败"
            exit 1
          fi
          
          echo "✓ 公证完成"
          
          echo "Staple..."
          xcrun stapler staple "$DMG_NAME"
          echo "✓ Staple 完成"
          
          # 移动到输出目录
          mkdir -p ../output
          mv "$DMG_NAME" ../output/
          
          ls -la ../output/

      - name: Verify
        run: |
          cd output
          DMG_PATH=$(find . -name "*.dmg" | head -1)
          
          echo "验证 DMG: $DMG_PATH"
          
          echo "验证签名..."
          codesign --verify --deep --strict --verbose=2 "$DMG_PATH"
          
          echo "验证公证..."
          spctl -a -t open -vvv --context context:primary-signature "$DMG_PATH"
          
          echo "验证 staple..."
          xcrun stapler validate "$DMG_PATH"
          
          echo "✓ 所有验证通过"

      - name: Upload signed DMG
        uses: actions/upload-artifact@v4
        with:
          name: EduClaw-${{ github.event.inputs.version }}-signed
          path: output/*.dmg
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/private_keys
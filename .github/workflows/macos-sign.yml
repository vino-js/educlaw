name: macOS Sign & Notarize

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: '未签名 ZIP 的下载链接（包含 .app 文件）'
        required: true
      version:
        description: '版本号（例如：0.1.0）'
        required: true
        default: '0.1.0'

jobs:
  sign-and-notarize:
    runs-on: macos-latest
    
    steps:
      - name: Download and extract app
        run: |
          mkdir -p build
          echo "下载 ZIP 文件..."
          curl -L "${{ github.event.inputs.app_url }}" -o build/unsigned.zip
          
          # 检查文件大小
          SIZE=$(stat -f%z build/unsigned.zip)
          echo "文件大小: $SIZE bytes"
          
          if [ "$SIZE" -lt 1000000 ]; then
            echo "❌ 文件太小，可能下载失败"
            exit 1
          fi
          
          echo "✓ 下载完成，开始解压..."
          cd build
          unzip unsigned.zip
          
          # 找到 .app 文件
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          echo "找到 .app: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app 文件"
            exit 1
          fi
          
          ls -la

      - name: Import signing certificate
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$MAC_CERT_BASE64" | base64 --decode -o $CERT_PATH
          security import $CERT_PATH -P "$MAC_CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          rm $CERT_PATH

      - name: Setup Apple API Key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Sign app
        run: |
          cd build
          
          # 找到 .app
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          echo "签名 .app: $APP_PATH"
          
          # 获取证书
          IDENTITY=$(security find-identities -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F '"' '{print $2}')
          
          if [ -z "$IDENTITY" ]; then
            echo "❌ 未找到签名证书"
            exit 1
          fi
          
          echo "使用证书：$IDENTITY"
          
          # 签名
          codesign --deep --force --sign "$IDENTITY" --options runtime "$APP_PATH"
          
          # 验证
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "✓ .app 签名完成"

      - name: Create and notarize DMG
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: |
          cd build
          
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          DMG_NAME="EduClaw_${{ github.event.inputs.version }}_signed.dmg"
          
          echo "创建 DMG..."
          hdiutil create -volname "EduClaw" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_NAME"
          echo "✓ DMG 创建完成: $DMG_NAME"
          
          echo "公证 DMG..."
          xcrun notarytool submit "$DMG_NAME" --wait \
            --issuer "$APPLE_API_ISSUER" \
            --key-id "$APPLE_API_KEY" \
            --key "$APPLE_API_KEY_PATH"
          
          echo "✓ 公证完成"
          
          echo "Staple..."
          xcrun stapler staple "$DMG_NAME"
          echo "✓ Staple 完成"
          
          # 移动到输出目录
          mkdir -p ../output
          mv "$DMG_NAME" ../output/
          
          ls -la ../output/

      - name: Verify
        run: |
          cd output
          DMG_PATH=$(find . -name "*.dmg" | head -1)
          
          echo "验证 DMG: $DMG_PATH"
          
          echo "验证签名..."
          codesign --verify --deep --strict --verbose=2 "$DMG_PATH"
          
          echo "验证公证..."
          spctl -a -t open -vvv --context context:primary-signature "$DMG_PATH"
          
          echo "验证 staple..."
          xcrun stapler validate "$DMG_PATH"
          
          echo "✓ 所有验证通过"

      - name: Upload signed DMG
        uses: actions/upload-artifact@v4
        with:
          name: EduClaw-${{ github.event.inputs.version }}-signed
          path: output/*.dmg
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/private_keys
name: macOS Sign & Notarize

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如：0.1.2）'
        required: true
        default: '0.1.2'

permissions:
  contents: write

env:
  OSS_BASE_URL: https://client.cxeduclaw.com/desktop/releases/mac

jobs:
  sign-and-notarize:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
      fail-fast: false
    
    steps:
      - name: Download unsigned files (${{ matrix.arch }})
        env:
          VERSION: ${{ github.event.inputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p build
          
          # 下载未签名的 ZIP
          ZIP_URL="${{ env.OSS_BASE_URL }}/${ARCH}/EduClaw_${VERSION}_mac_${ARCH}_unsigned.zip"
          echo "下载 ZIP: $ZIP_URL"
          curl -L "$ZIP_URL" -o build/unsigned.zip
          
          SIZE=$(stat -f%z build/unsigned.zip)
          echo "ZIP 文件大小: $SIZE bytes"
          
          if [ "$SIZE" -lt 1000000 ]; then
            echo "❌ ZIP 文件太小，可能下载失败"
            exit 1
          fi
          
          # 下载未签名的 yml（包含 releaseNotes）
          YML_URL="${{ env.OSS_BASE_URL }}/${ARCH}/latest-unsigned.yml"
          echo "下载 YML: $YML_URL"
          curl -L "$YML_URL" -o build/latest-unsigned.yml || echo "警告: yml 下载失败，将使用默认 releaseNotes"
          
          echo "✓ 下载完成，开始解压..."
          cd build
          unzip unsigned.zip
          
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          echo "找到 .app: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app 文件"
            exit 1
          fi
          
          ls -la

      - name: Import signing certificate
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$MAC_CERT_BASE64" | base64 --decode -o $CERT_PATH
          security import $CERT_PATH -P "$MAC_CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          rm $CERT_PATH

      - name: Setup Apple API Key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Sign app (${{ matrix.arch }})
        run: |
          cd build
          
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          echo "签名 .app: $APP_PATH"
          
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F '"' '{print $2}')
          
          if [ -z "$IDENTITY" ]; then
            echo "❌ 未找到签名证书"
            exit 1
          fi
          
          echo "使用证书：$IDENTITY"
          
          # 创建 entitlements 文件（Electron 需要 JIT 权限）
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.allow-dyld-environment-variables</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          ENTITLEMENTS_PATH="entitlements.plist"
          echo "创建 entitlements 文件: $ENTITLEMENTS_PATH"
          
          echo "签名嵌套的二进制文件..."
          
          # 1. 签名 Engine 二进制
          ENGINE_BINARIES_DIR="$APP_PATH/Contents/Resources/binaries"
          if [ -d "$ENGINE_BINARIES_DIR" ]; then
            echo "  签名 Engine 二进制文件..."
            for bin in "$ENGINE_BINARIES_DIR"/*; do
              if [ -f "$bin" ] && file "$bin" | grep -q "executable"; then
                echo "    签名: $(basename $bin)"
                codesign --force --sign "$IDENTITY" --options runtime "$bin"
              fi
            done
          fi
          
          # 2. 签名 Electron Framework 动态库
          ELECTRON_FRAMEWORK="$APP_PATH/Contents/Frameworks/Electron Framework.framework"
          if [ -d "$ELECTRON_FRAMEWORK" ]; then
            echo "  签名 Electron Framework 动态库..."
            LIBRARIES_DIR="$ELECTRON_FRAMEWORK/Versions/A/Libraries"
            if [ -d "$LIBRARIES_DIR" ]; then
              for lib in "$LIBRARIES_DIR"/*.dylib; do
                if [ -f "$lib" ]; then
                  echo "    签名: $(basename $lib)"
                  codesign --force --sign "$IDENTITY" --options runtime "$lib"
                fi
              done
            fi
            # 签名 Helpers
            HELPERS_DIR="$ELECTRON_FRAMEWORK/Versions/A/Helpers"
            if [ -d "$HELPERS_DIR" ]; then
              echo "  签名 Electron Framework Helpers..."
              for helper in "$HELPERS_DIR"/*; do
                if [ -f "$helper" ]; then
                  echo "    签名: $(basename $helper)"
                  codesign --force --sign "$IDENTITY" --options runtime "$helper"
                fi
              done
            fi
            
            # 签名 Electron Framework 本身（必须先签名子文件）
            echo "  签名 Electron Framework.framework..."
            # 注意：不要给 Electron Framework 添加 entitlements，避免 JIT 兼容性问题
            codesign --force --sign "$IDENTITY" --options runtime "$ELECTRON_FRAMEWORK"
          fi
          
          # 3. 签名 Squirrel.framework
          SQUIRREL_FRAMEWORK="$APP_PATH/Contents/Frameworks/Squirrel.framework"
          if [ -d "$SQUIRREL_FRAMEWORK" ]; then
            echo "  签名 Squirrel.framework..."
            SHIPIT="$SQUIRREL_FRAMEWORK/Versions/A/Resources/ShipIt"
            if [ -f "$SHIPIT" ]; then
              echo "    签名: ShipIt"
              codesign --force --sign "$IDENTITY" --options runtime "$SHIPIT"
            fi
            codesign --force --sign "$IDENTITY" --options runtime "$SQUIRREL_FRAMEWORK"
          fi
          
          # 4. 签名其他 frameworks
          echo "  签名其他 frameworks..."
          for framework in "$APP_PATH/Contents/Frameworks"/*.framework; do
            if [ -d "$framework" ] && [ "$framework" != "$SQUIRREL_FRAMEWORK" ]; then
              echo "    签名: $(basename $framework)"
              codesign --force --sign "$IDENTITY" --options runtime "$framework"
            fi
          done
          
          # 5. 签名 Helper apps
          echo "  签名 Helper apps..."
          for helper in "$APP_PATH/Contents/Frameworks"/*\ Helper*.app; do
            if [ -d "$helper" ]; then
              echo "    签名：$(basename $helper)"
              # 注意：不要给 Helper apps 添加 entitlements
              codesign --force --sign "$IDENTITY" --options runtime "$helper"
            fi
          done
          
          # 6. 签名整个 .app
          echo "签名 .app..."
          # 只对 .app 本身应用 entitlements（主程序需要 JIT）
          codesign --deep --force --sign "$IDENTITY" --options runtime --entitlements "$ENTITLEMENTS_PATH" "$APP_PATH"
          
          echo "验证签名..."
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "✓ .app 签名完成"

      - name: Create ZIP and DMG, notarize and staple (${{ matrix.arch }})
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: |
          cd build
          
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          ZIP_NAME="EduClaw_${{ github.event.inputs.version }}_mac_${{ matrix.arch }}.zip"
          DMG_NAME="EduClaw_${{ github.event.inputs.version }}_mac_${{ matrix.arch }}.dmg"
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F '"' '{print $2}')
          
          # 1. 创建 ZIP（用于 electron-updater 增量更新）
          echo "创建 ZIP..."
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "✓ ZIP 创建完成"
          
          # 2. 签名 ZIP
          echo "签名 ZIP..."
          codesign --force --sign "$IDENTITY" "$ZIP_NAME"
          echo "✓ ZIP 签名完成"
          
          # 3. 创建 DMG
          echo "创建 DMG..."
          mkdir -p dmg_temp
          cp -R "$APP_PATH" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "EduClaw" -srcfolder dmg_temp -ov -format UDZO "$DMG_NAME"
          rm -rf dmg_temp
          echo "✓ DMG 创建完成"
          
          # 4. 签名 DMG
          echo "签名 DMG 容器..."
          codesign --force --sign "$IDENTITY" "$DMG_NAME"
          echo "✓ DMG 签名完成"
          
          # 5. 公证 DMG
          echo "公证 DMG..."
          SUBMISSION_OUTPUT=$(xcrun notarytool submit "$DMG_NAME" --wait \
            --issuer "$APPLE_API_ISSUER" \
            --key-id "$APPLE_API_KEY" \
            --key "$APPLE_API_KEY_PATH" 2>&1)
          
          echo "$SUBMISSION_OUTPUT"
          
          SUBMISSION_ID=$(echo "$SUBMISSION_OUTPUT" | grep "id:" | head -1 | sed 's/.*id: //' | tr -d ' ')
          STATUS=$(echo "$SUBMISSION_OUTPUT" | grep "status:" | sed 's/.*status: //' | tr -d ' ')
          
          echo "Submission ID: $SUBMISSION_ID"
          echo "Status: $STATUS"
          
          echo "获取公证日志..."
          xcrun notarytool log "$SUBMISSION_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --key-id "$APPLE_API_KEY" \
            --key "$APPLE_API_KEY_PATH" > notary_log.json 2>&1 || true
          
          cat notary_log.json
          
          if [ "$STATUS" = "Invalid" ]; then
            echo "❌ DMG 公证失败"
            exit 1
          fi
          
          echo "✓ 公证完成"
          
          echo "Staple DMG..."
          for i in 1 2 3; do
            echo "  尝试 staple DMG (第 $i 次)..."
            if xcrun stapler staple "$DMG_NAME" 2>&1; then
              echo "  ✓ DMG Staple 成功"
              break
            else
              echo "  第 $i 次尝试失败，等待 5 秒后重试..."
              sleep 5
            fi
          done
          
          # 6. 生成 latest-mac.yml（包含正确的 sha512 和原始 releaseNotes）
          # 文件名加架构后缀，避免并行构建时互相覆盖
          YML_NAME="latest-mac-${{ matrix.arch }}.yml"
          echo "生成 $YML_NAME..."
          ZIP_SHA512=$(shasum -a 512 "$ZIP_NAME" | awk '{print $1}' | xxd -r -p | base64)
          ZIP_SIZE=$(stat -f%z "$ZIP_NAME")
          DMG_SHA512=$(shasum -a 512 "$DMG_NAME" | awk '{print $1}' | xxd -r -p | base64)
          DMG_SIZE=$(stat -f%z "$DMG_NAME")
          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          
          # 从下载的 yml 中提取 releaseNotes
          RELEASE_NOTES="修复了很多bug，优化了界面，提升了性能，增加了新功能"
          if [ -f "latest-unsigned.yml" ]; then
            EXTRACTED_NOTES=$(grep "releaseNotes:" latest-unsigned.yml | sed "s/releaseNotes: *//" | tr -d "'" | tr -d '"')
            if [ -n "$EXTRACTED_NOTES" ]; then
              RELEASE_NOTES="$EXTRACTED_NOTES"
            fi
          fi
          echo "使用 releaseNotes: $RELEASE_NOTES"
          
          cat > "$YML_NAME" << EOF
          version: ${{ github.event.inputs.version }}
          files:
            - url: $ZIP_NAME
              sha512: $ZIP_SHA512
              size: $ZIP_SIZE
            - url: $DMG_NAME
              sha512: $DMG_SHA512
              size: $DMG_SIZE
          path: $ZIP_NAME
          sha512: $ZIP_SHA512
          releaseDate: '$RELEASE_DATE'
          releaseNotes: '$RELEASE_NOTES'
          EOF
          
          echo "$YML_NAME 内容:"
          cat "$YML_NAME"
          
          mkdir -p ../output
          mv "$ZIP_NAME" ../output/
          mv "$DMG_NAME" ../output/
          mv "$YML_NAME" ../output/
          
          ls -la ../output/
          echo "✓ 全部完成"

      - name: Verify (${{ matrix.arch }})
        run: |
          cd output
          DMG_PATH=$(find . -name "*.dmg" | head -1)
          
          echo "验证 DMG: $DMG_PATH"
          
          echo "验证签名..."
          codesign --verify --deep --strict --verbose=2 "$DMG_PATH"
          
          echo "验证公证..."
          spctl -a -t open -vvv --context context:primary-signature "$DMG_PATH"
          
          echo "验证 staple..."
          xcrun stapler validate "$DMG_PATH"
          
          echo "✓ 所有验证通过"

      - name: Upload signed DMG, ZIP and latest-mac.yml to GitHub Release (${{ matrix.arch }})
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: EduClaw v${{ github.event.inputs.version }}
          files: |
            output/*.dmg
            output/*.zip
            output/latest-mac-*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Aliyun OSS (${{ matrix.arch }})
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
        run: |
          # 安装 ossutil
          curl -L https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-mac-amd64.zip -o ossutil.zip
          unzip ossutil.zip
          chmod +x ossutil-v1.7.18-mac-amd64/ossutil
          OSS_UTIL="$(pwd)/ossutil-v1.7.18-mac-amd64/ossutil"
          
          # 验证 OSS_REGION 格式（应该是 oss-cn-shanghai 这样的格式，不带 bucket）
          echo "OSS_REGION: $OSS_REGION"
          echo "OSS_BUCKET: $OSS_BUCKET"
          
          # 配置 ossutil
          # endpoint 格式: https://oss-cn-shanghai.aliyuncs.com
          $OSS_UTIL config -e "https://$OSS_REGION.aliyuncs.com" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"
          
          cd output
          
          # 上传 ZIP
          ZIP_FILE=$(find . -name "*.zip" | head -1)
          ZIP_BASENAME=$(basename "$ZIP_FILE")
          echo "上传 ZIP: $ZIP_FILE -> oss://$OSS_BUCKET/desktop/releases/mac/${{ matrix.arch }}/$ZIP_BASENAME"
          $OSS_UTIL cp "$ZIP_FILE" "oss://$OSS_BUCKET/desktop/releases/mac/${{ matrix.arch }}/$ZIP_BASENAME" -f
          
          # 上传 DMG
          DMG_FILE=$(find . -name "*.dmg" | head -1)
          DMG_BASENAME=$(basename "$DMG_FILE")
          echo "上传 DMG: $DMG_FILE -> oss://$OSS_BUCKET/desktop/releases/mac/${{ matrix.arch }}/$DMG_BASENAME"
          $OSS_UTIL cp "$DMG_FILE" "oss://$OSS_BUCKET/desktop/releases/mac/${{ matrix.arch }}/$DMG_BASENAME" -f
          
          # 上传 latest-mac.yml（重命名为标准名称）
          YML_FILE=$(find . -name "latest-mac-*.yml" | head -1)
          echo "上传 yml: $YML_FILE -> oss://$OSS_BUCKET/desktop/releases/mac/${{ matrix.arch }}/latest-mac.yml"
          $OSS_UTIL cp "$YML_FILE" "oss://$OSS_BUCKET/desktop/releases/mac/${{ matrix.arch }}/latest-mac.yml" -f
          
          echo "✓ OSS 上传完成"

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/private_keys
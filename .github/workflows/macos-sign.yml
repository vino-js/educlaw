name: macOS Sign & Notarize

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      dmg_url:
        description: '未签名 DMG 的下载链接（OSS/CDN 地址）'
        required: true
      version:
        description: '版本号（例如：0.1.0）'
        required: true
        default: '0.1.0'

jobs:
  sign-and-notarize:
    runs-on: macos-latest
    
    steps:
      - name: Download unsigned DMG
        run: |
          mkdir -p artifacts
          echo "下载 DMG 文件..."
          curl -L "${{ github.event.inputs.dmg_url }}" -o artifacts/unsigned.dmg
          
          # 检查文件大小
          SIZE=$(stat -f%z artifacts/unsigned.dmg)
          echo "文件大小: $SIZE bytes"
          
          if [ "$SIZE" -lt 1000000 ]; then
            echo "❌ 文件太小，可能下载失败"
            exit 1
          fi
          
          echo "✓ 下载完成"
          ls -la artifacts/

      - name: Import signing certificate
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          # 创建临时钥匙串
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # 导入证书
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$MAC_CERT_BASE64" | base64 --decode -o $CERT_PATH
          security import $CERT_PATH -P "$MAC_CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # 清理
          rm $CERT_PATH

      - name: Setup Apple API Key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Sign and Notarize
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: |
          DMG_PATH="artifacts/unsigned.dmg"
          
          echo "DMG 文件：$DMG_PATH"
          ls -la $DMG_PATH
          
          # 获取证书身份
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F '"' '{print $2}')
          
          if [ -z "$IDENTITY" ]; then
            echo "❌ 未找到签名证书"
            exit 1
          fi
          
          echo "使用证书：$IDENTITY"
          
          # 挂载 DMG 并签名内部的 .app
          echo "挂载 DMG..."
          hdiutil attach "$DMG_PATH" -readonly
          
          # 找到挂载点
          MOUNT_POINT=$(hdiutil info | grep "/Volumes/" | tail -1 | awk '{print $1}')
          echo "挂载点：$MOUNT_POINT"
          
          # 找到 .app
          APP_PATH=$(find "$MOUNT_POINT" -name "*.app" -type d | head -1)
          
          if [ -n "$APP_PATH" ]; then
            echo "签名 .app: $APP_PATH"
            codesign --deep --force --sign "$IDENTITY" --options runtime "$APP_PATH"
            echo "✓ .app 签名完成"
          fi
          
          # 卸载
          hdiutil detach "$MOUNT_POINT"
          
          # 公证 DMG
          echo "公证 DMG..."
          xcrun notarytool submit "$DMG_PATH" --wait \
            --issuer "$APPLE_API_ISSUER" \
            --key-id "$APPLE_API_KEY" \
            --key "$APPLE_API_KEY_PATH"
          
          echo "✓ 公证完成"
          
          # Staple
          echo "Staple 公证票据..."
          xcrun stapler staple "$DMG_PATH"
          
          echo "✓ Staple 完成"
          
          # 重命名
          mv "$DMG_PATH" "artifacts/EduClaw_${{ github.event.inputs.version }}_signed.dmg"

      - name: Verify signature
        run: |
          DMG_PATH="artifacts/EduClaw_${{ github.event.inputs.version }}_signed.dmg"
          
          echo "验证签名..."
          codesign --verify --deep --strict --verbose=2 "$DMG_PATH"
          
          echo "验证公证..."
          spctl -a -t open -vvv --context context:primary-signature "$DMG_PATH"
          
          echo "验证 staple..."
          xcrun stapler validate "$DMG_PATH"
          
          echo "✓ 所有验证通过"

      - name: Upload signed DMG
        uses: actions/upload-artifact@v4
        with:
          name: EduClaw-${{ github.event.inputs.version }}-signed
          path: artifacts/*.dmg
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/private_keys